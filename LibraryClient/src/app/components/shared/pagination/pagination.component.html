<div class="pagination-container" *ngIf="totalPages > 1">

    <button
        [disabled]="currentPage === 1"
        (click)="prevPage()">
        Previous
    </button>

    <span>
        Page {{ currentPage }} of {{ totalPages }}
    </span>

    <button
        [disabled]="currentPage >= totalPages"
        (click)="nextPage()">
        Next
    </button>

    <span class="total-records">
        {{ totalRecords }} results
    </span>

</div>
