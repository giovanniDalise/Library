<div class="container py-5">
    <div *ngIf="editors.length > 0; else noEditors">
        <div class="table-responsive">
            <table class="table editor-table align-middle">

                <thead>
                    <tr>
                        <th>Name</th>
                        <th *ngIf="isAdmin">Actions</th>
                    </tr>
                </thead>

                <tbody>
                <tr *ngFor="let editor of editors">
                    <td>{{ editor.name }}</td>
                </tr>
                </tbody>
            </table>

            <!-- PAGINAZIONE -->
            <div class="pagination-container">
                <button [disabled]="currentPage === 1" (click)="onPrevPage()">
                    Previous
                </button>

                <span>Page {{ currentPage }} of {{ totalPages }}</span>

                <button [disabled]="currentPage >= totalPages" (click)="onNextPage()">
                    Next
                </button>
            </div>            
        </div>
    </div>

    <ng-template #noEditors>
        <p>No editors found</p>    
    </ng-template>
</div>
