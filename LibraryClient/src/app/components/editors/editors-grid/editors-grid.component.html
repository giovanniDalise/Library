<div class="container py-5">
    <div *ngIf="editors.length > 0; else noEditors">
        <div class="table-responsive">
            <table class="table editor-table align-middle">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th *ngIf="isAdmin">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let editor of editors">
                        <td class="editor-name" (click)="onViewDetail(editor.id)">
                            {{ editor.name }}
                        </td>
                        <td *ngIf="isAdmin">
                            <!-- actions admin -->
                        </td>
                    </tr>
                </tbody>
            </table>

            <app-pagination
                [currentPage]="currentPage"
                [totalPages]="totalPages"
                [totalRecords]="totalRecords"
                (next)="onNextPage()"
                (prev)="onPrevPage()">
            </app-pagination>      
               
        </div>
    </div>

    <ng-template #noEditors>
        <p>No editors found</p>    
    </ng-template>
</div>
