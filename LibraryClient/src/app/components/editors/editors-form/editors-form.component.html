<div class="container py-5">
  <a routerLink="/editors" class="home-btn mb-3">
    <i class="bi bi-arrow-left"></i> Back to Editors
  </a>

  <div class="row justify-content-center">
    <div class="col-12 col-md-6">
      <div class="card shadow rounded p-4">

        <h2 class="text-center text-light mb-4">{{ pageTitle }}</h2>

        <form [formGroup]="editorForm" (ngSubmit)="onSubmit()" class="d-flex flex-column gap-3">

          <div class="input-group">
            <span class="input-group-text">Name</span>
            <input
              type="text"
              class="form-control"
              formControlName="name"
              placeholder="Editor name"/>
          </div>

          <button
            type="submit"
            class="btn btn-custom-outline w-100"
            [disabled]="editorForm.invalid">
            <i class="bi bi-check-circle"></i> {{ submitLabel }}
          </button>

        </form>

      </div>
    </div>
  </div>
</div>
