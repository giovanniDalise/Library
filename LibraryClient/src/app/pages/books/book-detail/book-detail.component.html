<div class="container py-5">

  <a class="home-btn mb-4" (click)="onBack()">
    Books
  </a>

  <div *ngIf="isLoading" class="text-center text-light mt-5">
    <div class="spinner-border" role="status"></div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger mt-4">
    {{ errorMessage }}
  </div>

  <div *ngIf="!isLoading && book" class="row justify-content-center">
    <div class="col-12 col-xl-10 col-xxl-9">

      <!-- Card dettaglio book -->
      <div class="card shadow rounded p-4 mb-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="text-light mb-0">{{ book.title }}</h2>
          <button class="btn btn-edit" (click)="onEdit()">
            <i class="bi bi-pencil"></i> Edit
          </button>
        </div>

        <div class="row g-4 align-items-center">

          <!-- Copertina -->
          <div class="col-12 col-md-auto d-flex justify-content-center">
            <img
              *ngIf="book.coverReference; else noCover"
              [src]="book.coverReference"
              alt="Cover of {{ book.title }}"
              class="book-cover rounded shadow"
            />
            <ng-template #noCover>
              <div class="book-cover-placeholder rounded shadow d-flex align-items-center justify-content-center">
                <i class="bi bi-image text-secondary fs-1"></i>
              </div>
            </ng-template>
          </div>

          <!-- Info libro -->
          <div class="col">
            <dl class="book-info-list">

              <div class="book-info-item">
                <dt><i class="bi bi-upc-scan me-2"></i>ISBN</dt>
                <dd>{{ book.isbn || '—' }}</dd>
              </div>

              <div class="book-info-item">
                <dt><i class="bi bi-person me-2"></i>Author</dt>
                <dd>{{ book.authorName }} {{ book.authorSurname }}</dd>
              </div>

              <div class="book-info-item">
                <dt><i class="bi bi-building me-2"></i>Editor</dt>
                <dd>{{ book.editorName || '—' }}</dd>
              </div>

            </dl>
          </div>

        </div>
      </div>

    </div>
  </div>

</div>
